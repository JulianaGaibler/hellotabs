name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.detect.outputs.version }}
      changed: ${{ steps.detect.outputs.changed }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-tags: true

      - id: detect
        run: |
          CURRENT=$(jq -r .version package.json)
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          if git rev-parse "v$CURRENT" >/dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  ci:
    uses: ./.github/workflows/ci.yml

  release:
    needs: [check-version, ci]
    if: needs.check-version.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Get version
        id: version
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      # Build and zip Chrome extension
      - run: npm run build:chrome
      - run: cd dist && zip -r ../hellotabs-chrome-v${{ steps.version.outputs.version }}.zip .

      # Build and zip Firefox extension
      - run: npm run build:firefox
      - run: cd dist && zip -r ../hellotabs-firefox-v${{ steps.version.outputs.version }}.zip .

      # Extract changelog for this version
      - name: Extract release notes
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract the section between ## [VERSION] and the next ## [
          NOTES=$(sed -n "/^## \[$VERSION\]/,/^## \[/{/^## \[$VERSION\]/d;/^## \[/d;p}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release v$VERSION"
          fi
          # Write to file to preserve multiline content
          echo "$NOTES" > release-notes.md

      # Create tag
      - run: |
          git tag v${{ steps.version.outputs.version }}
          git push origin v${{ steps.version.outputs.version }}

      # Create GitHub Release
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body_path: release-notes.md
          files: |
            hellotabs-chrome-v*.zip
            hellotabs-firefox-v*.zip
